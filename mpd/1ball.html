<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneBall M3U8 Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #081018, #111827, #07111d);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
        }

        .logo span {
            color: #34d399;
        }

        .search {
            flex: 1;
            min-width: 260px;
        }

        .search input {
            width: 100%;
            padding: 12px 18px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, .06);
            color: #fff;
            font-size: 15px;
            backdrop-filter: blur(18px);
        }

        .search input::placeholder {
            color: #94a3b8;
        }

        .stats {
            margin-bottom: 15px;
            opacity: .8;
            font-size: 14px;
        }

        /* Compact Grid Configuration */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Streamlined Card Design */
        .card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 16px;
            transition: .2s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,.25);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: #34d399;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .league {
            display: inline-block;
            background: rgba(52, 211, 153, 0.12);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
        }

        .time {
            font-size: 12px;
            opacity: .6;
        }

        /* Inline horizontal format for teams */
        .match {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .match span {
            color: #34d399;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Compact Signal Row Layout */
        .signal {
            background: #0f172a;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
        }

        .signal-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .badge {
            background: #34d399;
            color: #000;
            font-weight: 700;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .type {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
        }

        .url-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .url {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #94a3b8;
            font-size: 12px;
            background: #020617;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #1e293b;
        }

        .copy-btn {
            flex-shrink: 0;
            border: none;
            background: #34d399;
            color: #000;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: .2s;
        }

        .copy-btn:hover {
            background: #6ee7b7;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            opacity: .7;
            grid-column: 1 / -1;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 25px;
            transform: translateX(-50%);
            background: #22c55e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,.3);
            animation: slideUp .2s ease;
            font-weight: 600;
            font-size: 14px;
            z-index: 100;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @media(max-width: 480px) {
            body { padding: 12px; }
            .grid { grid-template-columns: 1fr; }
            .match { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">🏀 One<span>Ball</span></div>
        <div class="search"><input id="search" placeholder="Search league or team..."></div>
    </header>
    
    <div class="stats" id="stats">Loading matches...</div>
    <div class="grid" id="matches">
        <div class="loading">Loading live matches...</div>
    </div>
</div>

<div class="toast" id="toast">✅ M3U8 URL Copied</div>

<script>
const API = "https://oneball.tv/list.json";
let matches = [];

async function load() {
    try {
        const res = await fetch(API);
        matches = await res.json();
        render(matches);
    } catch(e) {
        document.getElementById("matches").innerHTML = 
        "<div class='loading'>Unable to load matches (CORS rule restriction?)</div>";
    }
}

function render(data) {
    document.getElementById("stats").innerHTML = `🏆 ${data.length} Live Matches`;
    let html = "";
    
    data.forEach(match => {
        html += `
        <div class="card">
            <div>
                <div class="card-meta">
                    <span class="league">${match.league_name}</span>
                    <span class="time">🕒 ${match.match_time}</span>
                </div>
                <div class="match">
                    ${match.home_team} <span>vs</span> ${match.away_team}
                </div>
            </div>
            <div class="signals-container">
        `;
        
        match.signals.forEach(signal => {
            html += `
                <div class="signal">
                    <div class="signal-top">
                        <div class="badge">${signal.label}</div>
                        <div class="type">${signal.play_type.toUpperCase()}</div>
                    </div>
                    <div class="url-row">
                        <div class="url">${signal.url}</div>
                        <button class="copy-btn" onclick="copyUrl('${signal.url}')">Copy</button>
                    </div>
                </div>
            `;
        });
        
        html += "</div></div>";
    });
    
    document.getElementById("matches").innerHTML = html || "<div class='loading'>No matches found</div>";
}

async function copyUrl(url) {
    try {
        await navigator.clipboard.writeText(url);
        const toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 1800);
    } catch(err) {
        alert(url);
    }
}

document.getElementById("search").addEventListener("input", function() {
    const q = this.value.toLowerCase();
    render(matches.filter(match =>
        match.home_team.toLowerCase().includes(q) ||
        match.away_team.toLowerCase().includes(q) ||
        match.league_name.toLowerCase().includes(q)
    ));
});

load();
</script>
</body>
</html>
