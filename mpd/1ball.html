<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- https://damizhibo.com/iptv.txt -->
<title>OneBall M3U8 Browser</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    background:linear-gradient(135deg,#081018,#111827,#07111d);
    min-height:100vh;
    color:#fff;
    padding:30px;
}

.container{
    max-width:1300px;
    margin:auto;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.logo{
    font-size:34px;
    font-weight:800;
}

.logo span{
    color:#34d399;
}

.search{
    flex:1;
    min-width:260px;
}

.search input{
    width:100%;
    padding:16px 20px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:#fff;
    font-size:16px;
    backdrop-filter:blur(18px);
}

.search input::placeholder{
    color:#94a3b8;
}

.stats{
    margin-bottom:25px;
    opacity:.8;
    font-size:15px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(420px,1fr));
    gap:22px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border-radius:22px;
    padding:22px;
    transition:.3s;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.card:hover{
    transform:translateY(-5px);
    border-color:#34d399;
}

.league{
    display:inline-block;
    background:#34d39922;
    color:#34d399;
    padding:6px 14px;
    border-radius:50px;
    font-size:13px;
    font-weight:600;
    margin-bottom:15px;
}

.match{
    font-size:24px;
    font-weight:800;
    margin-bottom:10px;
    line-height:1.4;
}

.time{
    display:flex;
    align-items:center;
    gap:8px;
    opacity:.7;
    margin-bottom:18px;
}

.signal{
    background:#0f172a;
    border-radius:16px;
    padding:15px;
    margin-top:15px;
}

.signal-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
}

.badge{
    background:#34d399;
    color:#000;
    font-weight:700;
    font-size:13px;
    padding:5px 12px;
    border-radius:50px;
}

.type{
    color:#94a3b8;
    font-size:13px;
    font-weight:600;
}

.url-row{
    display:flex;
    align-items:center;
    gap:12px;
}

.url{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    color:#d1d5db;
    font-size:13px;
    background:#020617;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid #1e293b;
}

.copy-btn{
    flex-shrink:0;
    border:none;
    background:#34d399;
    color:#000;
    padding:10px 16px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.copy-btn:hover{
    background:#6ee7b7;
    transform:translateY(-2px);
}

.loading{
    text-align:center;
    padding:80px;
    font-size:22px;
    opacity:.7;
}

.toast{
    position:fixed;
    right:25px;
    bottom:25px;
    background:#22c55e;
    color:#fff;
    padding:15px 22px;
    border-radius:12px;
    display:none;
    box-shadow:0 15px 40px rgba(0,0,0,.45);
    animation:fade .25s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

body{
    padding:15px;
}

.logo{
    font-size:28px;
}

.grid{
    grid-template-columns:1fr;
}

.match{
    font-size:20px;
}

.url-row{
    flex-direction:column;
    align-items:stretch;
}

.url{
    white-space:normal;
    word-break:break-all;
}

.copy-btn{
    width:100%;
}

}

</style>
</head>
<body>

<div class="container">

<header>

<div class="logo">
🏀 One<span>Ball</span>
</div>

<div class="search">
<input id="search" placeholder="Search league or team...">
</div>

</header>

<div class="stats" id="stats">
Loading matches...
</div>

<div class="grid" id="matches">
<div class="loading">Loading...</div>
</div>

</div>

<div class="toast" id="toast">
✅ M3U8 URL Copied
</div>

<script>

const API="https://oneball.tv/list.json";

let matches=[];

async function load(){

    try{

        const res=await fetch(API);
        matches=await res.json();

        render(matches);

    }catch(e){

        document.getElementById("matches").innerHTML=
        "<div class='loading'>Unable to load JSON (CORS blocked?)</div>";

    }

}

function render(data){

    document.getElementById("stats").innerHTML=
    `🏆 ${data.length} Live Matches`;

    let html="";

    data.forEach(match=>{

        html+=`
        <div class="card">

            <div class="league">${match.league_name}</div>

            <div class="match">
                ${match.home_team}
                <br>
                <span style="color:#34d399;">VS</span>
                <br>
                ${match.away_team}
            </div>

            <div class="time">
                🕒 ${match.match_time}
            </div>
        `;

        match.signals.forEach(signal=>{

            html+=`

            <div class="signal">

                <div class="signal-top">

                    <div class="badge">${signal.label}</div>

                    <div class="type">${signal.play_type.toUpperCase()}</div>

                </div>

                <div class="url-row">

                    <div class="url">
                        ${signal.url}
                    </div>

                    <button class="copy-btn" onclick="copyUrl('${signal.url}')">
                        📋 Copy
                    </button>

                </div>

            </div>

            `;

        });

        html+="</div>";

    });

    document.getElementById("matches").innerHTML=html;

}

async function copyUrl(url){

    try{

        await navigator.clipboard.writeText(url);

        const toast=document.getElementById("toast");

        toast.style.display="block";

        setTimeout(()=>{
            toast.style.display="none";
        },1800);

    }catch(err){

        alert(url);

    }

}

document.getElementById("search").addEventListener("input",function(){

    const q=this.value.toLowerCase();

    render(matches.filter(match=>

        match.home_team.toLowerCase().includes(q) ||

        match.away_team.toLowerCase().includes(q) ||

        match.league_name.toLowerCase().includes(q)

    ));

});

load();

</script>

</body>
</html>
