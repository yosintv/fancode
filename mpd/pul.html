<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M3U8 Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
}
video{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>
<body>

<video id="video" controls autoplay playsinline></video>

<script>
const video = document.getElementById('video');

const streamUrl = 'https://pul-tenm.nbs3g.com/live/hd-en-1-4460941.m3u8?txSecret=b235c501bff6a32f058316a40f9908f3&txTime=6A2F0391';

if (Hls.isSupported()) {
    const hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true
    });

    hls.loadSource(streamUrl);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(() => {});
    });
} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = streamUrl;
    video.addEventListener('loadedmetadata', () => {
        video.play().catch(() => {});
    });
}
</script>

</body>
</html>
