<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Football - Live Streams</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif
    }
    .video-container, #player-wrap {
      position: absolute;
      inset: 0;
      background: #000
    }
    #video {
      width: 100%;
      height: 100%
    }
    .shaka-spinner-container, .shaka-buffering-spinner, .shaka-spinner {
      display: none !important
    }
    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 5;
      color: rgba(255, 255, 255, .9);
      background: rgba(0, 0, 0, .55);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      max-width: 88vw
    }
    #status:empty {
      display: none
    }
    .hidden {
      display: none !important
    }
  </style>
</head>
<body>

  <div class="video-container">
    <div id="player-wrap" data-shaka-player-container>
      <video autoplay muted playsinline data-shaka-player id="video"></video>
    </div>
  </div>

  <div id="status"></div>

  <script>
    function showStatus(text) {
      var s = document.getElementById('status');
      if (s) s.textContent = text;
    }

    function onPlayerError(error) {
      var code = error && error.code ? error.code : 'UNKNOWN';
      console.error('Shaka error', error);
      showStatus('Stream failed (' + code + ')');
    }

    // Extracts the "?id=name" parameter from the browser's address bar url
    function getStreamIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      return id ? id.trim().toLowerCase() : null;
    }

    // Parses line-by-line items from your raw text format within mpd.js
    async function parseMpdPlaylist() {
      try {
        const response = await fetch('mpd.js');
        if (!response.ok) throw new Error('Could not load mpd.js');
        const text = await response.text();
        
        // Split file content row by row
        const lines = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        const playlist = [];

        for (let line of lines) {
          // Split elements on the line by their individual commas
          const segments = line.split(',').map(seg => seg.trim()).filter(seg => seg.length > 0);
          
          if (segments.length >= 3) {
            const id = segments[0].toLowerCase(); // 1st element: Custom Stream Name/ID
            const url = segments[1];              // 2nd element: Complete MPD Stream URL
            const clearKeys = {};

            // 3rd element and onwards: Read key configurations
            for (let i = 2; i < segments.length; i++) {
              if (segments[i].includes(':')) {
                const [keyId, key] = segments[i].split(':');
                if (keyId && key) {
                  clearKeys[keyId.trim()] = key.trim();
                }
              }
            }

            playlist.push({ id, url, clearKeys });
          }
        }

        if (playlist.length === 0) throw new Error('No valid streams found in configuration.');
        return playlist;

      } catch (error) {
        console.error('Parsing error:', error);
        showStatus('Configuration Error: ' + error.message);
        return null;
      }
    }

    async function initPlayer() {
      if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
        showStatus('Browser not supported');
        return;
      }

      shaka.polyfill.installAll();

      var video = document.getElementById('video');
      if (!video || !video.ui) {
        setTimeout(initPlayer, 80);
        return;
      }

      // 1. Fetch data arrays parsed line by line out of mpd.js
      const streams = await parseMpdPlaylist();
      if (!streams || streams.length === 0) return;

      // 2. Identify custom channel name or default fallback
      const targetId = getStreamIdFromUrl();
      let targetStream = null;

      if (targetId) {
        // Search array entries for a matching name field identifier
        targetStream = streams.find(stream => stream.id === targetId);
        if (!targetStream) {
          showStatus('Stream ID error: "' + targetId + '" not found in mpd.js');
          return;
        }
      } else {
        // No custom ID parameter requested; load the very first entry line item automatically
        targetStream = streams[0];
      }

      var ui = video.ui;
      var controls = ui.getControls();
      var player = controls.getPlayer();

      player.addEventListener('error', function(ev) { onPlayerError(ev.detail); });
      controls.addEventListener('error', function(ev) { onPlayerError(ev.detail); });

      ui.configure({
        controlPanelElements: [
          "play_pause",
          "mute",
          "volume",
          "spacer",
          "time_and_duration",
          "quality",
          "fullscreen",
          "overflow_menu"
        ]
      });

      player.configure({
        drm: { 
          clearKeys: targetStream.clearKeys 
        },
        streaming: { 
          bufferingGoal: 20, 
          rebufferingGoal: 2, 
          bufferBehind: 20 
        }
      });

      try {
        await player.load(targetStream.url);
        showStatus('');
        video.muted = false;
        video.play().catch(function() {});
      } catch (e) {
        onPlayerError(e);
      }
    }

    function initFailed() {
      showStatus('Unable to load Shaka UI');
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('shaka-ui-load-failed', initFailed);

    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(function() {});
    }
  </script>
</body>
</html>
