<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="referrer" content="no-referrer">
  <title>Live Stream Player</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/controls.css" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@latest/dist/shaka-player.ui.js" crossorigin="anonymous"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: sans-serif
    }
    .video-container, #player-wrap {
      position: absolute;
      inset: 0;
      background: #000
    }
    #video {
      width: 100%;
      height: 100%
    }
    .shaka-spinner-container, .shaka-buffering-spinner, .shaka-spinner {
      display: none !important
    }
    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 5;
      color: rgba(255, 255, 255, .9);
      background: rgba(0, 0, 0, .55);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      max-width: 88vw
    }
    #status:empty {
      display: none
    }
  </style>
</head>
<body>

  <div class="video-container">
    <div id="player-wrap" data-shaka-player-container>
      <video autoplay muted playsinline data-shaka-player id="video"></video>
    </div>
  </div>

  <div id="status"></div>

  <script>
    function showStatus(text) {
      var s = document.getElementById('status');
      if (s) s.textContent = text;
    }

    function onPlayerError(error) {
      var code = error && error.code ? error.code : 'UNKNOWN';
      console.error('Shaka error', error);
      showStatus('Stream failed (' + code + ')');
    }

    function getStreamIdFromUrl() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      return id ? id.trim().toLowerCase() : null;
    }

    // Advanced non-linear parser that ignores custom commented line elements
    async function parseMpdPlaylist() {
      try {
        const response = await fetch('mpd.js');
        if (!response.ok) throw new Error('Could not load mpd.js');
        const text = await response.text();
        
        // 1. Split text into lines to easily strip out notes/comments first
        const cleanLines = text.split('\n')
                               .map(line => line.trim())
                               .filter(line => line.length > 0 && !line.startsWith('#') && !line.startsWith('//'));

        // 2. Re-combine clean lines and split everything precisely by commas
        const allSegments = cleanLines.join(' ')
                                      .split(',')
                                      .map(seg => seg.trim())
                                      .filter(seg => seg.length > 0);
        
        const playlist = [];
        let i = 0;

        while (i < allSegments.length) {
          const item = allSegments[i];
          const lowerItem = item.toLowerCase();

          // Match streaming source addresses (.mpd or .m3u8)
          if (lowerItem.includes('.mpd') || lowerItem.includes('.m3u8')) {
            const id = allSegments[i - 1] ? allSegments[i - 1].split(' ').pop().toLowerCase() : null;
            const url = item;
            const clearKeys = {};
            
            i++; 

            // Gather structural clearKeys values sequentially
            while (i < allSegments.length && 
                   !allSegments[i].toLowerCase().includes('.mpd') && 
                   !allSegments[i].toLowerCase().includes('.m3u8')) {
              const prospectiveKey = allSegments[i];
              if (prospectiveKey.includes(':')) {
                const [keyId, key] = prospectiveKey.split(':');
                if (keyId && key) {
                  const cleanKeyId = keyId.trim().split(' ').pop();
                  const cleanKey = key.trim().split(' ')[0];
                  clearKeys[cleanKeyId] = cleanKey;
                }
              }
              i++;
            }

            if (id && url) {
              playlist.push({ id, url, clearKeys });
            }
          } else {
            i++;
          }
        }

        if (playlist.length === 0) throw new Error('No valid streams found.');
        return playlist;

      } catch (error) {
        console.error('Parsing error:', error);
        showStatus('Configuration Error: ' + error.message);
        return null;
      }
    }

    async function initPlayer() {
      if (!window.shaka || !shaka.Player || !shaka.Player.isBrowserSupported()) {
        showStatus('Browser not supported');
        return;
      }

      shaka.polyfill.installAll();

      var video = document.getElementById('video');
      if (!video || !video.ui) {
        setTimeout(initPlayer, 80);
        return;
      }

      const streams = await parseMpdPlaylist();
      if (!streams || streams.length === 0) return;

      const targetId = getStreamIdFromUrl();
      let targetStream = null;

      if (targetId) {
        targetStream = streams.find(stream => stream.id === targetId);
        if (!targetStream) {
          showStatus('Stream ID error: "' + targetId + '" not found');
          return;
        }
      } else {
        targetStream = streams[0];
      }

      var ui = video.ui;
      var controls = ui.getControls();
      var player = controls.getPlayer();

      player.addEventListener('error', function(ev) { onPlayerError(ev.detail); });
      controls.addEventListener('error', function(ev) { onPlayerError(ev.detail); });

      ui.configure({
        controlPanelElements: [
          "play_pause",
          "mute",
          "volume",
          "spacer",
          "time_and_duration",
          "quality",
          "fullscreen",
          "overflow_menu"
        ]
      });

      const playerConfig = {
        streaming: { 
          bufferingGoal: 20, 
          rebufferingGoal: 2, 
          bufferBehind: 20 
        }
      };

      if (Object.keys(targetStream.clearKeys).length > 0) {
        playerConfig.drm = { clearKeys: targetStream.clearKeys };
      }

      player.configure(playerConfig);

      try {
        await player.load(targetStream.url);
        showStatus('');
        video.muted = false;
        video.play().catch(function() {});
      } catch (e) {
        onPlayerError(e);
      }
    }

    document.addEventListener('shaka-ui-loaded', initPlayer);
    document.addEventListener('shaka-ui-load-failed', () => showStatus('Unable to load Shaka UI'));

    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(function() {});
    }
  </script>
</body>
</html>
