<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Sync Player (Chrome Fixed)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: black;
}
video {
    width: 100%;
    height: 100vh;
}
#overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    color: white;
    font-size: 20px;
    cursor: pointer;
    z-index: 10;
}
</style>
</head>

<body>

<div id="overlay">▶ Click to Start</div>
<video id="video" controls playsinline muted></video>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');

// Hidden audio
const audio = document.createElement('audio');
audio.style.display = 'none';
document.body.appendChild(audio);

const VIDEO_URL = "https://global-media.onlive.vn/live/video/2689994162/1280x720/playlist.m3u8";
const AUDIO_URL = "https://global-media.onlive.vn/live/audio/2689994162/origin/playlist.m3u8";

// Load streams
function loadStream(media, url) {
    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(media);
    } else {
        media.src = url;
    }
}

loadStream(video, VIDEO_URL);
loadStream(audio, AUDIO_URL);

// 👉 USER INTERACTION FIX
overlay.addEventListener('click', async () => {
    overlay.style.display = 'none';

    try {
        video.muted = true;
        await video.play();

        audio.muted = false;
        await audio.play();

    } catch (e) {
        console.log("Play error:", e);
    }
});

// 🔥 SYNC ENGINE
function syncAV() {
    if (video.readyState < 2 || audio.readyState < 2) return;

    const drift = video.currentTime - audio.currentTime;

    if (Math.abs(drift) > 1.5) {
        audio.currentTime = video.currentTime;
        audio.playbackRate = 1;
    } else if (Math.abs(drift) > 0.2) {
        audio.playbackRate = drift > 0 ? 1.05 : 0.95;
    } else {
        audio.playbackRate = 1;
    }
}

setInterval(syncAV, 200);

// Sync controls
video.addEventListener('pause', () => audio.pause());
video.addEventListener('play', () => audio.play().catch(()=>{}));
video.addEventListener('seeking', () => audio.currentTime = video.currentTime);
video.addEventListener('volumechange', () => audio.volume = video.volume);

</script>

</body>
</html>
