<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Combined HLS Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: black;
}
video {
    width: 100%;
    height: 100vh;
}
</style>
</head>

<body>

<video id="video" controls autoplay muted></video>

<script>
const video = document.getElementById('video');

// Create hidden audio element
const audio = document.createElement('audio');
audio.style.display = 'none';
document.body.appendChild(audio);

// URLs
const videoSrc = "https://global-media.onlive.vn/live/video/2689994162/1280x720/playlist.m3u8";
const audioSrc = "https://global-media.onlive.vn/live/audio/2689994162/origin/playlist.m3u8";

// Load VIDEO
if (Hls.isSupported()) {
    const hlsVideo = new Hls();
    hlsVideo.loadSource(videoSrc);
    hlsVideo.attachMedia(video);
} else {
    video.src = videoSrc;
}

// Load AUDIO
if (Hls.isSupported()) {
    const hlsAudio = new Hls();
    hlsAudio.loadSource(audioSrc);
    hlsAudio.attachMedia(audio);
} else {
    audio.src = audioSrc;
}

// Sync play
video.addEventListener('play', () => {
    audio.play();
});

// Sync pause
video.addEventListener('pause', () => {
    audio.pause();
});

// Sync seeking
video.addEventListener('seeking', () => {
    audio.currentTime = video.currentTime;
});

// Keep sync (important)
setInterval(() => {
    if (Math.abs(video.currentTime - audio.currentTime) > 0.5) {
        audio.currentTime = video.currentTime;
    }
}, 1000);

// Volume control (optional)
video.addEventListener('volumechange', () => {
    audio.volume = video.volume;
});

</script>

</body>
</html>
