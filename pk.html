<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Sync HLS Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: black;
}
video {
    width: 100%;
    height: 100vh;
    background: black;
}
</style>
</head>

<body>

<video id="video" controls autoplay muted playsinline></video>

<script>
const video = document.getElementById('video');

// Hidden audio
const audio = document.createElement('audio');
audio.style.display = 'none';
document.body.appendChild(audio);

// URLs
const VIDEO_URL = "https://global-media.onlive.vn/live/video/2689994162/1280x720/playlist.m3u8";
const AUDIO_URL = "https://global-media.onlive.vn/live/audio/2689994162/origin/playlist.m3u8";

// Load HLS
function loadStream(media, url) {
    if (Hls.isSupported()) {
        const hls = new Hls({
            maxBufferLength: 10,
            liveSyncDuration: 3
        });
        hls.loadSource(url);
        hls.attachMedia(media);
        return hls;
    } else {
        media.src = url;
    }
}

loadStream(video, VIDEO_URL);
loadStream(audio, AUDIO_URL);

// 🔥 MASTER SYNC ENGINE
let syncing = false;

function syncAV() {
    if (!video || !audio || video.readyState < 2 || audio.readyState < 2) return;

    const drift = video.currentTime - audio.currentTime;

    // If big drift → hard sync
    if (Math.abs(drift) > 1.5) {
        audio.currentTime = video.currentTime;
        audio.playbackRate = 1.0;
        return;
    }

    // Medium drift → smooth correction
    if (Math.abs(drift) > 0.2) {
        audio.playbackRate = drift > 0 ? 1.05 : 0.95;
    } else {
        audio.playbackRate = 1.0;
    }
}

// Run sync loop (VERY IMPORTANT)
setInterval(syncAV, 200);

// Sync controls
video.addEventListener('play', () => {
    audio.play().catch(() => {});
});

video.addEventListener('pause', () => {
    audio.pause();
});

video.addEventListener('seeking', () => {
    audio.currentTime = video.currentTime;
});

video.addEventListener('ratechange', () => {
    audio.playbackRate = video.playbackRate;
});

video.addEventListener('volumechange', () => {
    audio.volume = video.volume;
});

// Handle buffering resync
video.addEventListener('waiting', () => {
    audio.pause();
});

video.addEventListener('playing', () => {
    audio.play().catch(() => {});
});

// Initial sync when ready
video.addEventListener('loadeddata', () => {
    audio.currentTime = video.currentTime;
});

</script>

</body>
</html>
